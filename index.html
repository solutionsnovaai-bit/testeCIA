<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>C.I.A — Conteúdo Infinito com IA</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Custom Cursor -->
  <div class="cursor"></div>
  <div class="cursor-ring"></div>

  <!-- Background Effects -->
  <div class="bg-mesh">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="orb orb-4"></div>
    <div class="orb orb-5"></div>
  </div>
  <div class="circuit-bg"></div>
  <div class="particles"></div>

  <!-- App Shell -->
  <div class="app">

    <!-- Header -->
    <header>
      <div class="logo-wrap">
        <div class="logo-icon">CIA</div>
        <div class="logo-text">
          <span class="logo-name">C.I.A</span>
          <span class="logo-sub">Conteúdo Infinito com IA</span>
        </div>
      </div>
      <div class="header-badge">
        <span class="badge badge-cyan">15 Agentes</span>
        <span class="badge badge-gold">IA Especializada</span>
        <span class="badge badge-green">100% Gratuito</span>
      </div>
    </header>

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-label">Agentes Disponíveis</div>
      <div class="agent-list"></div>
    </aside>

    <!-- Main Content -->
    <main class="main main-content">
      <!-- Welcome state (hidden after first agent selection) -->
      <div class="welcome-state">
        <div class="welcome-emoji">🤖</div>
        <div class="welcome-title">Escolha seu Agente</div>
        <p class="welcome-sub">Selecione um nicho na lista ao lado para acessar o agente de conteúdo especializado.</p>
        <div class="welcome-hint">
          <span>←</span>
          Clique em um agente para começar
        </div>
      </div>
      <!-- Agent cards rendered by JS -->
    </main>

  </div>

  <script src="main.js"></script>
</body>
</html>
